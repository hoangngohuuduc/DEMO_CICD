- name: docker build and push
  hosts: local
  become: yes

  vars:
    image_name: duchoang26/demo
    image_tag: "{{ lookup('env','BUILD_NUMBER') }}"

  tasks:
    - name: Update apt package cache
      apt:
        update_cache: yes   

    - name: Build Docker Image
      command: docker build -t demo:{{ image_tag }} .
      args:
        chdir: /var/lib/jenkins/workspace/demo

    - name: tag image version
      command: docker tag demo:{{ image_tag }} {{ image_name }}:{{ image_tag }}

    - name: tag latest
      command: docker tag demo:{{ image_tag }} {{ image_name }}:latest

    - name: Log in to Docker Hub
      community.docker.docker_login:
        registry_url: https://index.docker.io/v1/
        username: duchoang26
        password: dckr_pat_VXddE0AYrB5ovCPm73QZZ8Fhi3w

    - name: Push version image
      command: docker push {{ image_name }}:{{ image_tag }}

    - name: Push latest image
      command: docker push {{ image_name }}:latest

    - name: Remove old container
      command: docker rm -f pet1
      ignore_errors: yes

    - name: Run container
      command: docker run -d --restart=always --name pet1 -p 8081:8080 {{ image_name }}:{{ image_tag }}
