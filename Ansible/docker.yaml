- name: docker build and push
  hosts: local
  become: yes

  vars:
    image_name: "{{ image_name }}"
    image_tag: "{{ image_tag }}"

  tasks:
    - name: Update apt package cache
      apt:
        update_cache: yes

    - name: Build Docker Image
      command: docker build -t demo:{{ image_tag }} .
      args:
        chdir: /var/lib/jenkins/workspace/demo

    - name: Tag version
      command: docker tag demo:{{ image_tag }} {{ image_name }}:{{ image_tag }}

    - name: Tag latest
      command: docker tag demo:{{ image_tag }} {{ image_name }}:latest

    - name: Log in to Docker Hub
      community.docker.docker_login:
        username: duchoang26
        password: "{{ docker_password }}"

    - name: Push version
      command: docker push {{ image_name }}:{{ image_tag }}

    - name: Push latest
      command: docker push {{ image_name }}:latest

    # ✅ FIX LỖI CONTAINER TRÙNG
    - name: Stop container if running
      command: docker stop pet1
      ignore_errors: yes

    - name: Remove container if exists
      command: docker rm pet1
      ignore_errors: yes

    # ✅ RUN CONTAINER CHUẨN
    - name: Run container
      command: docker run -d --name pet1 -p 8081:8080 {{ image_name }}:{{ image_tag }}
