- name: docker build and push
  hosts: local
  become: yes

  vars:
    image_name: "{{ lookup('env','IMAGE_NAME') }}"
    image_tag: "{{ lookup('env','IMAGE_TAG') }}"

  tasks:
    - name: Build Docker Image
      command: docker build -t demo:{{ image_tag }} .
      args:
        chdir: /var/lib/jenkins/workspace/demo

    - name: Tag version
      command: docker tag demo:{{ image_tag }} {{ image_name }}:{{ image_tag }}

    - name: Tag latest
      command: docker tag demo:{{ image_tag }} {{ image_name }}:latest

    - name: Login Docker Hub
      community.docker.docker_login:
        username: duchoang26
        password: dckr_pat_ekADZCaFf5Gxb3JJ65fe2FFBZvw

    - name: Push version
      command: docker push {{ image_name }}:{{ image_tag }}

    - name: Push latest
      command: docker push {{ image_name }}:latest

    - name: Remove old container
      command: docker rm -f pet1
      ignore_errors: yes

    - name: Run new container
      command: docker run -d --name pet1 -p 8081:8080 {{ image_name }}:{{ image_tag }}
